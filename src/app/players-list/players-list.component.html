<h4>Player List</h4>

<mat-form-field class="search-for-player">
  <mat-label>Search for a player</mat-label>
  <input matInput [formControl]="playerSearch">
</mat-form-field>
@if (players$ | async; as players) {
  <app-generic-grid-component [dataSource]="players" [displayedColumns]="displayedColumns"
    (rowClicked)="onPlayerSelected($event)">
  </app-generic-grid-component>
}
